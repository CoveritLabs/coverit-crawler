name: coverit

services:
  crawler:
    image: ghcr.io/coveritlabs/coverit-crawler:${CRAWLER_TAG:-dev}
    build:
      context: ${CRAWLER_DIR}
      secrets:
        - npm_token
    pull_policy: always
    container_name: coverit-crawler
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=${REDIS_URL:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-15m}
      - JWT_REFRESH_EXPIRY_SECONDS=${JWT_REFRESH_EXPIRY_SECONDS:-604800}
      - RESET_TOKEN_TTL_SECONDS=${RESET_TOKEN_TTL_SECONDS:-3600}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - CORS_CREDENTIALS=${CORS_CREDENTIALS:-true}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:3000/crawler/v1/auth/oauth/google/callback}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-http://localhost:3000/crawler/v1/auth/oauth/github/callback}
      - RESEND_CRAWLER_KEY=${RESEND_CRAWLER_KEY:-}
      - RESET_PASSWORD_EMAIL=${RESET_PASSWORD_EMAIL:-}
      - RESET_PASSWORD_TEMPLATE_ID=${RESET_PASSWORD_TEMPLATE_ID:-}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:18
    container_name: coverit-postgres
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-coverit}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: coverit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

secrets:
  npm_token:
    environment: GITHUB_TOKEN

volumes:
  postgres_data:
  redis_data:
